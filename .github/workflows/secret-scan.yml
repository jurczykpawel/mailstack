name: Secret scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trufflehog:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Scan the full history directly (the action's BASE/HEAD diff errors out when
      # BASE == HEAD, e.g. on a single-commit or freshly force-pushed repo).
      - name: TruffleHog secret scan (full history)
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b "$RUNNER_TEMP/bin"
          "$RUNNER_TEMP/bin/trufflehog" git "file://$PWD" --only-verified --fail --no-update
