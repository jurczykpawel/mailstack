name = "mailstack"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain for THIS deployment. FORK: change the pattern to your own domain (its zone
# must live in the same Cloudflare account as the Worker), or delete this `routes` block to
# just use the default *.workers.dev URL. workers.dev stays enabled as a fallback either way.
routes = [
  { pattern = "mailer.techskills.academy", custom_domain = true },
]

# Non-secret config. Region for Amazon SES (must match where your SES identity/domain is verified).
[vars]
SES_REGION = "eu-west-1"

# Fixed-window rate limiter store (public mode). KV namespace ids are NOT secrets, but they
# are specific to one Cloudflare account. FORK: create your own with
# `wrangler kv namespace create RATE_LIMIT` (and `... --preview`) and replace the ids below.
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "4e9bfb4a6ba8436183e026f3fd008b8c"
preview_id = "52e32471b7e246d3bae49d8f3be086d8"

# SECRETS — never put these in this file. Set each one with `wrangler secret put <NAME>`:
#   wrangler secret put SES_ACCESS_KEY_ID      # AWS IAM access key id (SES SendEmail only)
#   wrangler secret put SES_SECRET_ACCESS_KEY  # AWS IAM secret access key
#   wrangler secret put TURNSTILE_SECRET       # Cloudflare Turnstile secret key (server-side)
#   wrangler secret put API_KEY                # bearer token for trusted (server-to-server) mode
